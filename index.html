<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mini Chat</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>Mini Chat</h1>

<input
id="username"
placeholder="نام کاربری">

<input
id="password"
type="password"
placeholder="رمز عبور">

<br><br>

<button onclick="register()">
ثبت نام
</button>

<button onclick="login()">
ورود
</button>

<div id="result"></div>

<hr>
<div id="profile">
    <h3 id="currentUser">مهمان</h3>

    <button onclick="logout()">
        خروج از حساب
    </button>
</div>
<input
id="message"
type="text"
placeholder="پیام بنویس">

<button onclick="sendMessage()">
ارسال
</button>

<hr>

<div id="messages"></div>

<script src="https://bak-mf27.onrender.com/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>

</html>
