<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MiniChat Pro</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>MiniChat Pro</h1>

<div class="login-box">

<input
id="username"
placeholder="نام کاربری">

<input
id="password"
type="password"
placeholder="رمز عبور">

<button onclick="register()">
ثبت نام
</button>

<button onclick="login()">
ورود
</button>

<button onclick="logout()">
خروج
</button>

</div>

<div id="profile">

👤 <span id="currentUser">
مهمان
</span>

</div>

<div class="online-box">

<h3>
کاربران آنلاین
</h3>

<div id="onlineUsers">
</div>

</div>

<div class="chat-box">

<div id="messages">
</div>

<div class="send-box">

<input
id="message"
placeholder="پیام بنویس">

<button onclick="sendMessage()">
ارسال
</button>

</div>

</div>

</div>

<script src="https://bak-mf27.onrender.com/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>

</html>
